<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>勇士日记</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a1a;--card:#12122a;--card2:#1a1a35;
  --purple:#7c3aed;--purple2:#a855f7;
  --gold:#fbbf24;--gold2:#f59e0b;
  --green:#10b981;--blue:#3b82f6;--pink:#ec4899;
  --text:#e8e0ff;--dim:#6b5f8f;--border:rgba(124,58,237,0.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{
  font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);
  min-height:100vh;padding-bottom:40px;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 10%,rgba(124,58,237,0.2) 0%,transparent 70%),
    radial-gradient(ellipse 50% 30% at 80% 90%,rgba(168,85,247,0.15) 0%,transparent 70%);
}
.hero{text-align:center;padding:24px 16px 12px}
.hero-av{font-size:72px;display:block;animation:bob 2.5s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(168,85,247,0.6))}
@keyframes bob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-10px) scale(1.05)}}
.hero-name{font-size:20px;font-weight:900;background:linear-gradient(135deg,#c084fc,#fbbf24);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:6px}
.hero-sub{font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:2px}
.lv-card{margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:14px 18px;position:relative;overflow:hidden}
.lv-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--purple),var(--gold))}
.lv-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lv-badge{background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-weight:900;font-size:13px;padding:5px 14px;border-radius:20px;letter-spacing:1px}
.lv-xp{font-size:12px;color:var(--dim)}
.xp-track{height:12px;background:rgba(255,255,255,0.07);border-radius:12px;overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--gold));border-radius:12px;transition:width 0.8s cubic-bezier(.34,1.56,.64,1);position:relative}
.xp-fill::after{content:'';position:absolute;right:2px;top:50%;transform:translateY(-50%);width:6px;height:6px;border-radius:50%;background:#fff;filter:blur(1px)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 16px 10px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:12px 6px;text-align:center}
.stat-i{font-size:22px}.stat-v{font-size:22px;font-weight:900;color:var(--gold);line-height:1.1}.stat-l{font-size:10px;color:var(--dim);margin-top:2px}
.datebar{display:flex;align-items:center;justify-content:space-between;margin:0 16px 10px;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:10px 16px;font-size:13px}
.date-l{color:var(--dim)}.date-r{font-weight:900;color:var(--purple2)}
.streak{margin:0 16px 14px;background:linear-gradient(135deg,rgba(251,191,36,.12),rgba(245,158,11,.06));border:1px solid rgba(251,191,36,.3);border-radius:20px;padding:14px 18px;display:flex;align-items:center;gap:14px}
.streak-fire{font-size:44px;animation:flicker .4s ease-in-out infinite alternate}
@keyframes flicker{from{transform:scale(1) rotate(-4deg)}to{transform:scale(1.12) rotate(4deg)}}
.streak-right{flex:1}.streak-num{font-size:34px;font-weight:900;color:var(--gold);line-height:1}.streak-txt{font-size:11px;color:var(--dim)}
.streak-dots{display:flex;gap:5px;margin-top:8px}.sdot{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.08)}.sdot.on{background:var(--gold);box-shadow:0 0 7px var(--gold)}
.sec{margin:0 16px 4px}.sec-head{display:flex;align-items:center;gap:8px;padding:4px 0;margin-bottom:8px}
.sec-icon{font-size:20px}.sec-title{font-size:15px;font-weight:900}
.sec-badge{margin-left:auto;font-size:11px;font-weight:800;padding:3px 10px;border-radius:10px}
.task{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .15s,background .2s,border-color .2s;position:relative;overflow:hidden;min-height:64px}
.task:active{transform:scale(.96)}
.task.done{border-color:rgba(16,185,129,.5);background:rgba(16,185,129,.07)}
.chk{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:16px;transition:all .3s cubic-bezier(.34,1.56,.64,1);background:rgba(255,255,255,.03)}
.task.done .chk{background:var(--green);border-color:var(--green);box-shadow:0 0 14px rgba(16,185,129,.5);font-size:18px}
.task-emo{font-size:26px;flex-shrink:0}
.task-body{flex:1;min-width:0}.task-name{font-size:14px;font-weight:800;color:var(--text);line-height:1.2}.task.done .task-name{color:var(--dim);text-decoration:line-through}.task-desc{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4}
.task-xp{font-size:12px;font-weight:900;color:var(--gold);background:rgba(251,191,36,.12);padding:4px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0}
.sec-gap{height:8px}
.done-btn{margin:16px 16px 0;width:calc(100% - 32px);padding:18px;background:linear-gradient(135deg,var(--purple),var(--purple2));color:#fff;font-size:16px;font-weight:900;border:none;border-radius:20px;cursor:pointer;letter-spacing:1px;box-shadow:0 8px 28px rgba(124,58,237,.4);transition:transform .15s,opacity .2s}
.done-btn:active{transform:scale(.97)}.done-btn:disabled{background:rgba(255,255,255,.08);color:var(--dim);box-shadow:none;cursor:not-allowed}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--green);color:#fff;font-size:15px;font-weight:900;padding:12px 28px;border-radius:30px;z-index:999;transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;box-shadow:0 6px 20px rgba(16,185,129,.5)}
.toast.show{transform:translateX(-50%) translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:all}
.popup{background:var(--card2);border:1px solid var(--border);border-radius:28px;padding:36px 28px;text-align:center;max-width:320px;width:88%;transform:scale(.8);transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.overlay.show .popup{transform:scale(1)}
.pop-emo{font-size:80px;margin-bottom:12px;display:block;animation:pop-bounce .6s ease}
@keyframes pop-bounce{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.pop-title{font-size:26px;font-weight:900;color:var(--gold);margin-bottom:8px}
.pop-txt{font-size:14px;color:var(--dim);line-height:1.7;margin-bottom:24px;white-space:pre-line}
.pop-btn{background:linear-gradient(135deg,var(--purple),var(--gold));color:#fff;border:none;padding:14px 36px;border-radius:16px;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 6px 20px rgba(124,58,237,.4)}
.particle{position:fixed;pointer-events:none;z-index:200;font-size:24px;animation:fly 1s ease-out forwards}
@keyframes fly{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-150px) scale(0.5);opacity:0}}
</style>
</head>
<body>

<div class="toast" id="toast">⭐ +10 XP</div>
<div class="overlay" id="overlay">
  <div class="popup">
    <span class="pop-emo" id="pop-emo">🎉</span>
    <div class="pop-title" id="pop-title">太棒了！</div>
    <div class="pop-txt" id="pop-txt"></div>
    <button class="pop-btn" onclick="closePopup()">继续冒险！⚔️</button>
  </div>
</div>

<div class="hero">
  <span class="hero-av" id="hero-av">🧙‍♂️</span>
  <div class="hero-name" id="hero-name">新手冒险者</div>
  <div class="hero-sub">四年级 · 每日闯关</div>
</div>

<div class="lv-card">
  <div class="lv-top">
    <div class="lv-badge">⚔️ LV <span id="lv-num">1</span></div>
    <div class="lv-xp">XP <span id="xp-cur">0</span> / <span id="xp-max">100</span></div>
  </div>
  <div class="xp-track"><div class="xp-fill" id="xp-bar" style="width:0%"></div></div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-i">🔥</div><div class="stat-v" id="s-streak">0</div><div class="stat-l">连续天</div></div>
  <div class="stat"><div class="stat-i">⭐</div><div class="stat-v" id="s-stars">0</div><div class="stat-l">总星星</div></div>
  <div class="stat"><div class="stat-i">🏆</div><div class="stat-v" id="s-days">0</div><div class="stat-l">完成天</div></div>
</div>

<div class="datebar">
  <span class="date-l" id="d-date">今天</span>
  <span class="date-r" id="d-prog">0/0 关卡</span>
</div>

<div class="streak">
  <div class="streak-fire">🔥</div>
  <div class="streak-right">
    <div class="streak-num" id="streak-big">0</div>
    <div class="streak-txt">天连续打卡</div>
    <div class="streak-dots" id="streak-dots"></div>
  </div>
</div>

<div class="sec">
  <div class="sec-head"><span class="sec-icon">🌅</span><span class="sec-title">早晨关卡</span><span class="sec-badge" id="b-morning" style="background:rgba(251,191,36,.12);color:var(--gold)">0/3</span></div>
  <div id="t-morning"></div>
</div>
<div class="sec-gap"></div>

<div class="sec">
  <div class="sec-head"><span class="sec-icon">💪</span><span class="sec-title">健康关卡</span><span class="sec-badge" id="b-health" style="background:rgba(236,72,153,.12);color:var(--pink)">0/5</span></div>
  <div id="t-health"></div>
</div>
<div class="sec-gap"></div>

<div class="sec">
  <div class="sec-head"><span class="sec-icon">📚</span><span class="sec-title">学习关卡</span><span class="sec-badge" id="b-study" style="background:rgba(59,130,246,.12);color:var(--blue)">0/4</span></div>
  <div id="t-study"></div>
</div>
<div class="sec-gap"></div>

<div class="sec">
  <div class="sec-head"><span class="sec-icon">🌙</span><span class="sec-title">睡前关卡</span><span class="sec-badge" id="b-night" style="background:rgba(124,58,237,.12);color:var(--purple2)">0/3</span></div>
  <div id="t-night"></div>
</div>

<button class="done-btn" id="done-btn" onclick="completeDay()">🌟 完成今日所有关卡！</button>
<button class="done-btn" id="battle-btn" onclick="gotoBattle()" style="background:linear-gradient(135deg,#ef4444,#f97316);margin-top:10px;" disabled>⚔️ 进入战斗副本（完成作业后解锁）</button>

<script>
const TASKS={
  morning:[
    {id:'m1',emo:'🎧',name:'早餐听英语',desc:'吃早饭时播放英语音频，磨耳朵',xp:15},
    {id:'m2',emo:'📖',name:'晨读10分钟',desc:'大声朗读课文或英语，每天坚持',xp:20},
    {id:'m3',emo:'🍳',name:'吃早餐',desc:'好好吃饭，补充能量迎接新一天',xp:10},
  ],
  health:[
    {id:'h1',emo:'🧴',name:'涂药（早）',desc:'手术后护理，早晨涂药膏',xp:15},
    {id:'h2',emo:'🧴',name:'涂药（下午）',desc:'手术后护理，下午涂药膏',xp:15},
    {id:'h3',emo:'🧴',name:'涂药（晚）',desc:'手术后护理，睡前涂药膏',xp:15},
    {id:'h4',emo:'🦷',name:'认真刷牙',desc:'早晚各一次，好好刷2分钟',xp:15},
    {id:'h5',emo:'🥩',name:'嚼肉脯',desc:'多多咀嚼，帮助乳牙快快脱落',xp:10},
    {id:'n1',emo:'🦶',name:'走路姿势练习',desc:'今天走路有没有注意不内八？',xp:10},
  ],
  study:[
    {id:'s1',emo:'🔤',name:'英语单词',desc:'每天10个，背完默写过关才算',xp:30},
    {id:'s2',emo:'✍️',name:'语文写字',desc:'5个生字写3遍，明天默写检查',xp:25},
    {id:'s3',emo:'📝',name:'完成作业',desc:'点击进入今日作业清单',xp:20,link:'今日作业.html'},
    {id:'s4',emo:'📚',name:'课外阅读',desc:'睡前读喜欢的书20分钟',xp:15},
  ],
  night:[
    {id:'n2',emo:'🛁',name:'洗漱完毕',desc:'洗脸刷牙，干干净净上床',xp:10},
    {id:'n3',emo:'😴',name:'9点前上床',desc:'好好睡觉，明天继续升级！',xp:20},
  ],
};

const LV_XP=[0,100,220,380,570,800,1080,1420,1830,2320,2900];
const LV_NAMES=['新手冒险者','初级勇士','铜牌骑士','银牌战士','金牌英雄','白金斗士','钻石强者','精英战神','传奇英雄','无敌霸主','神话帝王'];
const LV_AVS=['🧙‍♂️','🗡️','🛡️','⚔️','🦸','👑','🔥','💫','🌟','⚡','🏆'];

let S=JSON.parse(localStorage.getItem('hero_v3')||'null')||{xp:0,streak:0,stars:0,days:0,lastDate:'',checked:{},done:false};

const todayKey=()=>{const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`};

if(S.lastDate!==todayKey()){
  const d=new Date();d.setDate(d.getDate()-1);
  const yest=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
  if(S.lastDate!==yest)S.streak=0;
  S.checked={};S.done=false;S.lastDate=todayKey();save();
}

function save(){localStorage.setItem('hero_v3',JSON.stringify(S))}

function getLv(){let lv=1;for(let i=1;i<LV_XP.length;i++){if(S.xp>=LV_XP[i])lv=i+1;else break;}return Math.min(lv,LV_XP.length)}

function getLvProg(){const lv=getLv();const cur=LV_XP[lv-1]||0;const nxt=LV_XP[lv]||(cur+600);return{cur:S.xp-cur,max:nxt-cur,pct:Math.min(100,((S.xp-cur)/(nxt-cur))*100)}}

function renderSection(cat,tid,bid){
  const el=document.getElementById(tid);el.innerHTML='';
  TASKS[cat].forEach(t=>{
    const done=!!S.checked[t.id];
    const d=document.createElement('div');
    d.className='task'+(done?' done':'');
    d.onclick=()=>toggle(t.id,t.xp,d,t.link);;
    d.innerHTML=`<div class="chk">${done?'✓':''}</div><div class="task-emo">${t.emo}</div><div class="task-body"><div class="task-name">${t.name}</div><div class="task-desc">${t.desc}</div></div><div class="task-xp">+${t.xp}XP</div>`;
    el.appendChild(d);
  });
  const done=TASKS[cat].filter(t=>S.checked[t.id]).length;
  document.getElementById(bid).textContent=`${done}/${TASKS[cat].length}`;
}

function allTasks(){return Object.values(TASKS).flat()}
// 检查今日作业是否全部完成
if(localStorage.getItem('homework_all_done')==='true' && !S.checked['s3']){
  S.checked['s3']=true;
  S.xp+=20;
  S.stars+=1;
  localStorage.removeItem('homework_all_done');
  save();
}
function updateUI(){
  const lv=getLv();const pg=getLvProg();
  document.getElementById('lv-num').textContent=lv;
  document.getElementById('xp-cur').textContent=pg.cur;
  document.getElementById('xp-max').textContent=pg.max;
  document.getElementById('xp-bar').style.width=pg.pct+'%';
  document.getElementById('hero-av').textContent=LV_AVS[Math.min(lv-1,LV_AVS.length-1)];
  document.getElementById('hero-name').textContent=LV_NAMES[Math.min(lv-1,LV_NAMES.length-1)];
  document.getElementById('s-streak').textContent=S.streak;
  document.getElementById('s-stars').textContent=S.stars;
  document.getElementById('s-days').textContent=S.days;
  document.getElementById('streak-big').textContent=S.streak;
  const d=new Date();const days=['日','一','二','三','四','五','六'];
  document.getElementById('d-date').textContent=`${d.getMonth()+1}月${d.getDate()}日 周${days[d.getDay()]}`;
  const dots=document.getElementById('streak-dots');dots.innerHTML='';
  for(let i=0;i<7;i++){const dot=document.createElement('div');dot.className='sdot'+(i<S.streak?' on':'');dots.appendChild(dot)}
  renderSection('morning','t-morning','b-morning');
  renderSection('health','t-health','b-health');
  renderSection('study','t-study','b-study');
  renderSection('night','t-night','b-night');
  const all=allTasks();const dc=all.filter(t=>S.checked[t.id]).length;
  document.getElementById('d-prog').textContent=`${dc}/${all.length} 关卡`;
  const btn=document.getElementById('done-btn');const allDone=all.every(t=>S.checked[t.id]);
  btn.disabled=!allDone||S.done;
  const battleBtn=document.getElementById('battle-btn');
const studyDone=['s1','s2','s3','s4'].every(id=>S.checked[id]);
battleBtn.disabled=!studyDone;
battleBtn.textContent=studyDone?'⚔️ 进入战斗副本！':'⚔️ 进入战斗副本（完成4个学习关卡后解锁）';
  if(S.done)btn.textContent='🏆 今日全部通关！明天继续！';
  else if(allDone)btn.textContent='🎉 全部完成！领取奖励！';
  else btn.textContent=`⚔️ 还剩 ${all.length-dc} 个关卡（加油！）`;
}

function toggle(id,xp,el,link){
  if(S.done)return;
  if(link){
    window.location.href=link;
    return;
  }
  if(S.checked[id]){delete S.checked[id];S.xp=Math.max(0,S.xp-xp);S.stars=Math.max(0,S.stars-1);}
  else{S.checked[id]=true;S.xp+=xp;S.stars+=1;showToast(`⭐ +${xp} XP`);spawnParticles(el);}
  save();updateUI();
}

function completeDay(){
  if(S.done)return;
  S.done=true;S.streak+=1;S.days+=1;
  const bonus=S.streak>=7?150:S.streak>=3?80:40;
  S.xp+=bonus;save();updateUI();
  setTimeout(()=>{
    const msg=S.streak>=7?`🔥 连续${S.streak}天！传奇勇士！\n奖励 +${bonus}XP！\n你真的太厉害了！`:`今日全部关卡通关！\n奖励 +${bonus}XP！\n连续打卡 ${S.streak} 天 🔥`;
    showPopup(S.streak>=7?'👑':'🎊','全部通关！',msg);
  },300);
}
function gotoBattle(){
  window.location.href='战斗副本.html';
}

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function showPopup(emo,title,txt){
  document.getElementById('pop-emo').textContent=emo;
  document.getElementById('pop-title').textContent=title;
  document.getElementById('pop-txt').textContent=txt;
  document.getElementById('overlay').classList.add('show');
}

function closePopup(){document.getElementById('overlay').classList.remove('show')}

function spawnParticles(el){
  const rect=el.getBoundingClientRect();
  ['⭐','✨','💫','🌟'].forEach((e,i)=>{
    const p=document.createElement('div');p.className='particle';p.textContent=e;
    p.style.left=(rect.left+rect.width/2+Math.random()*60-30)+'px';
    p.style.top=(rect.top+rect.height/2)+'px';
    p.style.animationDelay=(i*0.08)+'s';
    document.body.appendChild(p);setTimeout(()=>p.remove(),1200);
  });
}

updateUI();
</script>
</body>
</html>
